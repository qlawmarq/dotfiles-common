# Upstream skills sync configuration
# Format: <local-skill-name> <repo-url> <path-in-repo> [branch]
#
# - local-skill-name: directory name under skills/
# - repo-url: git repository URL
# - path-in-repo: path to the skill directory within the repository
# - branch: (optional) branch/tag/ref to sync from, defaults to "main"
#
# Lines starting with # are comments. Empty lines are ignored.

skill-creator  https://github.com/anthropics/skills  skills/skill-creator  main
plan-ceo-review  https://github.com/garrytan/gstack  plan-ceo-review  main
